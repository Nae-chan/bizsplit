# Render Blueprint — https://render.com/docs/blueprint-spec
# Worker + cron services will be added in Chunk 6 (settlement engine).
services:
  - type: web
    name: bizsplit-web
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run build
    preDeployCommand: npm run db:migrate
    startCommand: npm run start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: DATABASE_URL
        fromDatabase:
          name: bizsplit-db
          property: connectionString

databases:
  - name: bizsplit-db
    plan: basic-256mb
    postgresMajorVersion: "17"
